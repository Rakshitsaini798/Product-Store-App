<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="A simple product store powered by the Fake Store API.">
    <title>Store API Integration</title>
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header>
        <div class="container header-content">
            <h1 id="main-title">Online Store</h1>
            <button id="theme-toggle" class="theme-btn">🌙 Dark Mode</button>
        </div>
    </header>

    <main class="container">
        <!-- Search and Filters -->
        <div class="controls-container">
            <input type="text" id="search-input" placeholder="Search products..." aria-label="Search products">
            
            <div class="filter-group">
                <select id="category-filter" aria-label="Filter by category">
                    <option value="all">All Categories</option>
                </select>
                
                <select id="sort-select" aria-label="Sort products">
                    <option value="default">Sort by Default</option>
                    <option value="price-low">Price: Low to High</option>
                    <option value="price-high">Price: High to Low</option>
                </select>

                <button id="favorites-toggle" class="fav-btn">
                    Show Favorites (<span id="fav-count">0</span>)
                </button>
            </div>
        </div>
        <!-- Status Messages -->
        <div id="status-container">
            <p id="loading-message" class="status-text">Loading products...</p>
            <p id="error-message" class="status-text hidden">Failed to load data. Please try again later.</p>
        </div>

        <!-- Product Grid -->
        <div id="product-grid" class="product-grid">
            <!-- Products will be injected here dynamically -->
        </div>
    </main>

    <script src="script.js"></script>
</body>

</html>
